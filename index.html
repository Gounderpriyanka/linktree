<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Priyanka Gounder — Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
  :root{
    --asphalt:#0a0d14;
    --navy:#0e1730;
    --racing-red:#e2102b;
    --racing-red-dark:#8f0a1c;
    --electric-blue:#1657ff;
    --chrome:#eef2f8;
    --amber:#ffb100;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    min-height:100vh;
    background:
      radial-gradient(700px 500px at 12% 8%, rgba(226,16,43,0.16), transparent 60%),
      radial-gradient(700px 500px at 88% 92%, rgba(22,87,255,0.20), transparent 60%),
      linear-gradient(180deg, var(--asphalt), var(--navy) 60%, var(--asphalt));
    font-family:'Barlow', sans-serif;
    color:var(--chrome);
    overflow-x:hidden;
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:64px 16px 110px;
  }

  /* ---------- ambient speed-line texture ---------- */
  .speedlines{
    position:fixed; inset:0; z-index:0; pointer-events:none; opacity:0.06;
    background:repeating-linear-gradient(115deg, #fff 0px, #fff 1px, transparent 1px, transparent 60px);
    animation: drift 6s linear infinite;
  }
  @keyframes drift{ from{background-position:0 0;} to{background-position:-400px 0;} }

  /* ---------- floating embers ---------- */
  .ember{
    position:fixed; bottom:-10px; border-radius:50%;
    background:radial-gradient(circle, var(--amber), transparent 70%);
    opacity:0; pointer-events:none; z-index:1;
    animation: rise linear infinite;
  }
  @keyframes rise{
    0%{ transform:translateY(0) scale(1); opacity:0; }
    10%{ opacity:0.8; }
    90%{ opacity:0.3; }
    100%{ transform:translateY(-100vh) scale(0.3); opacity:0; }
  }

  /* ---------- card ---------- */
  .pass{
    position:relative; z-index:2;
    max-width:420px; width:100%;
    background:rgba(255,255,255,0.045);
    backdrop-filter:blur(14px);
    border-radius:20px;
    border:1px solid rgba(255,255,255,0.09);
    box-shadow:0 30px 60px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.06);
    padding:0;
    overflow:hidden;
  }
  .pass::before{
    content:"";
    position:absolute; inset:0; padding:1px; border-radius:20px;
    background:linear-gradient(135deg, var(--racing-red), transparent 30%, transparent 70%, var(--electric-blue));
    -webkit-mask:linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor; mask-composite: exclude;
    pointer-events:none;
  }

  .pass-header{
    padding:18px 22px 14px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px dashed rgba(255,255,255,0.15);
  }
  .eyebrow{
    font-family:'Rajdhani',sans-serif; font-weight:600; letter-spacing:3px;
    font-size:11px; color:rgba(238,242,248,0.55); text-transform:uppercase;
  }
  .bib{
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:26px;
    color:var(--racing-red);
    background:rgba(226,16,43,0.12);
    border:1.5px solid rgba(226,16,43,0.5);
    border-radius:8px;
    padding:2px 12px;
    line-height:1.1;
  }

  .profile{ text-align:center; padding:28px 26px 10px; }
  .avatar-ring{
    width:96px; height:96px; margin:0 auto 16px;
    border-radius:50%;
    padding:3px;
    background:conic-gradient(var(--racing-red), var(--electric-blue), var(--racing-red));
    animation:spin-ring 4s linear infinite;
  }
  @keyframes spin-ring{ to{ transform:rotate(360deg); } }
  .avatar-ring img{
    width:100%; height:100%; border-radius:50%; object-fit:cover;
    border:3px solid var(--asphalt); display:block;
  }
  h1{
    font-family:'Rajdhani',sans-serif; font-weight:700; font-size:26px; margin:4px 0 4px;
    letter-spacing:0.5px;
  }
  .tagline{
    font-size:14px; color:rgba(238,242,248,0.68); margin:0 0 18px;
    font-weight:500;
  }

  .checker{
    height:8px; margin:0 0 22px;
    background-image:
      linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%),
      linear-gradient(45deg, #fff 25%, transparent 25%, transparent 75%, #fff 75%);
    background-size:12px 12px; background-position:0 0, 6px 6px;
    opacity:0.15;
  }

  .links{ padding:0 22px 26px; display:flex; flex-direction:column; gap:12px; }

  .link-button{
    position:relative; overflow:hidden; isolation:isolate;
    display:flex; align-items:center; gap:12px;
    padding:13px 16px; border-radius:10px;
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.08);
    border-left:4px solid var(--stripe, var(--racing-red));
    color:var(--chrome); text-decoration:none;
    font-weight:600; font-size:15px;
    transition:transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
  }
  .link-button i{ width:20px; text-align:center; color:var(--stripe, var(--racing-red)); font-size:17px; }
  .link-button:hover{
    transform:translateX(4px) translateY(-2px);
    background:rgba(255,255,255,0.08);
    box-shadow:0 10px 24px rgba(0,0,0,0.35), 0 0 0 1px var(--stripe, var(--racing-red)) inset;
  }
  .link-button.blue{ --stripe: var(--electric-blue); }

  .ripple{
    position:absolute; border-radius:50%; transform:scale(0);
    background:rgba(255,255,255,0.5); pointer-events:none; z-index:0;
    animation:ripple-anim 0.6s ease-out;
  }
  @keyframes ripple-anim{ to{ transform:scale(4); opacity:0; } }

  footer{
    text-align:center; padding:0 22px 22px; font-size:12px;
    color:rgba(238,242,248,0.4); letter-spacing:1px; text-transform:uppercase;
    font-family:'Rajdhani',sans-serif; font-weight:600;
  }

  /* ---------- scroll reveal ---------- */
  .reveal{ opacity:0; transform:translateY(28px) rotate(-0.5deg); transition:opacity 0.6s ease, transform 0.6s cubic-bezier(.2,.8,.2,1); }
  .reveal.in-view{ opacity:1; transform:translateY(0) rotate(0); }

  /* ================= ROAD + CAR ================= */
  .road-strip{
    position:fixed; left:0; bottom:0; width:100%; height:56px; z-index:10; pointer-events:none;
    background:linear-gradient(180deg, #14161c, #05060a);
    border-top:2px solid rgba(255,255,255,0.06);
  }
  .lane{
    position:absolute; top:50%; left:0; width:200%; height:4px; transform:translateY(-50%);
    background-image:repeating-linear-gradient(90deg, var(--amber) 0 40px, transparent 40px 80px);
    opacity:0.55;
    animation:lane-move 1.1s linear infinite;
  }
  @keyframes lane-move{ from{ transform:translate(0,-50%);} to{ transform:translate(-80px,-50%);} }

  .car-track{ position:fixed; left:0; bottom:6px; width:100%; height:70px; z-index:11; pointer-events:none; overflow:hidden; }
  .car-wrap{ position:absolute; bottom:0; left:-260px; width:230px; animation:drive 6.5s linear infinite; }
  @keyframes drive{ 0%{left:-260px;} 100%{left:112%;} }
  .car-body{ animation:suspension 0.18s ease-in-out infinite alternate; transform-origin:center bottom; }
  @keyframes suspension{ from{ transform:translateY(0) rotate(0deg); } to{ transform:translateY(-2.2px) rotate(-0.4deg); } }

  .wheel{ transform-origin:center; animation:spin 0.28s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .headlight-glow{ animation:pulse-glow 0.5s ease-in-out infinite alternate; }
  @keyframes pulse-glow{ from{ opacity:0.55; } to{ opacity:1; } }

  .spark{ animation:flicker 0.15s steps(2) infinite; }
  @keyframes flicker{ 50%{ opacity:0.2; } }

  @media (max-width:480px){
    .car-wrap{ width:170px; left:-190px; }
    .pass{ max-width:94vw; }
  }
  @media (prefers-reduced-motion: reduce){
    *{ animation:none !important; transition:none !important; }
  }
</style>
</head>

<script>
  // ripple on tap/click
  document.querySelectorAll('.link-button').forEach(function(btn){
    btn.addEventListener('click', function(e){
      var rect = btn.getBoundingClientRect();
      var size = Math.max(rect.width, rect.height);
      var ripple = document.createElement('span');
      ripple.className = 'ripple';
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = ((e.clientX || rect.left + rect.width/2) - rect.left - size/2) + 'px';
      ripple.style.top = ((e.clientY || rect.top + rect.height/2) - rect.top - size/2) + 'px';
      btn.appendChild(ripple);
      setTimeout(function(){ ripple.remove(); }, 600);
    });
  });

  // scroll reveal
  var revealEls = document.querySelectorAll('.reveal');
  var io = new IntersectionObserver(function(entries){
    entries.forEach(function(entry, i){
      if(entry.isIntersecting){
        setTimeout(function(){ entry.target.classList.add('in-view'); }, i * 70);
        io.unobserve(entry.target);
      }
    });
  }, { threshold: 0.15 });
  revealEls.forEach(function(el){ io.observe(el); });

  // ambient ember particles
  var emberCount = window.innerWidth < 480 ? 8 : 14;
  for (var i = 0; i < emberCount; i++){
    var e = document.createElement('div');
    e.className = 'ember';
    var size = 2 + Math.random() * 4;
    e.style.width = e.style.height = size + 'px';
    e.style.left = (Math.random() * 100) + 'vw';
    e.style.animationDuration = (4 + Math.random() * 5) + 's';
    e.style.animationDelay = (Math.random() * 6) + 's';
    document.body.appendChild(e);
  }
</script>
